                <style>
                        :root {
                            color-scheme: dark;

                        * {
                            box-sizing: border-box;

                        body {
                            font-family: 'Segoe UI', Arial, sans-serif;
                            margin: 0;
                            min-height: 100vh;
                            color: #f4f8ff;
                            background:
                                linear-gradient(120deg, rgba(3, 8, 24, 0.88), rgba(8, 24, 48, 0.82)),
                                url('IndexBG.png') center center / auto 100% no-repeat;
                            background-attachment: scroll;
                            display: flex;
                            justify-content: center;
                            align-items: flex-start;
                            padding: 36px 16px 40px;
                        }

                        .page-shell {
                            width: min(620px, 100%);
                            padding: 28px 24px 32px;
                            background: rgba(5, 14, 30, 0.76);
                            border: 1px solid rgba(108, 182, 255, 0.35);
                            border-radius: 20px;
                            box-shadow: 0 0 0 1px rgba(255,255,255,0.04) inset, 0 20px 60px rgba(0, 0, 0, 0.4);
                            backdrop-filter: blur(14px);
                        }

                        h1 {
                            color: #8ddcff;
                            text-align: center;
                            margin: 0 0 10px;
                            font-size: 2.1rem;
                            letter-spacing: 0.24em;
                            text-transform: uppercase;
                            text-shadow: 0 0 16px rgba(141, 220, 255, 0.45);
                        }

                        .subtitle {
                            text-align: center;
                            margin: 0 0 20px;
                            color: #cfe8ff;
                            opacity: 0.9;
                            font-size: 0.95rem;
                            letter-spacing: 0.08em;
                            text-transform: uppercase;
                        }

                        .puzzle-list {
                            display: flex;
                            flex-direction: column;
                            gap: 10px;
                        }

                        .puzzle-item {
                            display: block;
                            background: linear-gradient(90deg, rgba(16, 66, 129, 0.95) 0%, rgba(7, 142, 199, 0.95) 100%);
                            color: #f8fbff;
                            text-decoration: none;
                            font-size: 1.02em;
                            padding: 14px 16px;
                            border-radius: 12px;
                            border: 1px solid rgba(153, 219, 255, 0.24);
                            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
                            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
                            position: relative;
                            overflow: hidden;
                        }

                        .puzzle-item::before {
                            content: '';
                            position: absolute;
                            inset: 0;
                            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.16), transparent);
                            transform: translateX(-100%);
                            transition: transform 0.35s ease;
                        }

                        .puzzle-item:hover {
                            background: linear-gradient(90deg, rgba(24, 95, 178, 0.98) 0%, rgba(45, 191, 255, 0.98) 100%);
                            box-shadow: 0 12px 28px rgba(45, 191, 255, 0.24);
                            transform: translateY(-3px) scale(1.01);
                        }

                        .puzzle-item:hover::before {
                            transform: translateX(100%);
                        }

                        /* mobile tweaks */
                        @media (max-width: 600px) {
                            body {
                                padding: 16px 10px 24px;
                            }

                            .page-shell {
                                padding: 20px 14px 24px;
                            }

                            h1 {
                                font-size: 1.6rem;
                                letter-spacing: 0.16em;
                            }

                            .subtitle {
                                font-size: 0.8rem;
                            }

                            .puzzle-item {
                                font-size: 0.96em;
                                padding: 12px 14px;
                            }
                        }

                        </style>
