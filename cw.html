<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Cryptic Crossword</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Special+Elite&display=swap');

        :root {
            --bg-color: #171717; /* Very dark desk surface */
            --paper-color: #f5f2e9; /* Aged paper */
            --accent: #0a0a0a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            /* Subtle wood/dark texture */
            background-image: repeating-linear-gradient(45deg, #171717 25%, transparent 25%, transparent 75%, #171717 75%, #171717), repeating-linear-gradient(45deg, #171717 25%, #1a1a1a 25%, #1a1a1a 75%, #171717 75%, #171717);
            background-position: 0 0, 10px 10px;
            background-size: 20px 20px;
        }

        /* Navigation */
        .top-nav {
            width: 100%;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(5px);
            padding: 15px 40px;
            box-sizing: border-box;
            border-bottom: 1px solid #333;
            position: absolute;
            top: 0;
            z-index: 10;
        }
        
        .home-btn {
            color: #d4d4d8;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.2s;
        }
        
        .home-btn:hover { color: white; }

        /* The Artifact Wrapper */
        .puzzle-wrapper {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 100px 20px 40px 20px; /* Offset for nav */
        }

        .puzzle-artifact {
            background-color: var(--paper-color);
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
            padding: 60px;
            border-radius: 4px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8), inset 0 0 40px rgba(139, 69, 19, 0.05);
            display: flex;
            position: relative;
            transform: rotate(-1deg); /* Slight rotation for realism */
        }

        /* Artifact Markings */
        .artifact-title {
            position: absolute;
            top: 25px;
            left: 50px;
            font-family: 'Special Elite', cursive;
            font-size: 16px;
            color: #3f3f46;
        }

        .stamp {
            position: absolute;
            top: 30px;
            right: 40px;
            font-family: 'Inter', sans-serif;
            font-size: 22px;
            font-weight: 900;
            color: #b91c1c;
            border: 4px solid #b91c1c;
            padding: 4px 12px;
            border-radius: 4px;
            transform: rotate(12deg);
            opacity: 0.7;
            letter-spacing: 2px;
        }

        /* Y-Axis Labels */
        .y-axis {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            padding-right: 20px;
            font-size: 14px;
            font-weight: bold;
            color: #71717a;
            text-align: right;
            padding-bottom: 25px; /* Offset for X-axis */
            margin-top: 15px; /* Alignment fix */
            font-family: 'Special Elite', cursive;
        }

        .y-axis span {
            height: 50px; 
            display: flex;
            align-items: center;
        }

        /* Grid Container */
        .grid-container {
            display: flex;
            flex-direction: column;
            margin-top: 15px;
        }

        table {
            border-collapse: collapse;
            table-layout: fixed;
            background: transparent;
            box-shadow: 0 0 0 2px #27272a; /* Thick outer border */
        }

        td {
            width: 50px;
            height: 50px;
            border: 1px solid #71717a;
            text-align: center;
            vertical-align: middle;
            font-size: 26px;
            font-weight: normal; /* Typewriter fonts don't need bold */
            font-family: 'Special Elite', cursive;
            color: #18181b;
        }

        /* X-Axis Labels */
        .x-axis {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
            font-size: 16px;
            font-weight: bold;
            color: #71717a;
            font-family: 'Special Elite', cursive;
        }
        
        .x-axis span {
            width: 50px;
            text-align: center;
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <a href="index.html" class="home-btn">← Home</a>
    </nav>

    <div class="puzzle-wrapper">
        <div class="puzzle-artifact">
            <div class="artifact-title">EVIDENCE REF: 407290 - "Germany"</div>
            <div class="stamp">CONFIDENTIAL</div>
            
            <div class="y-axis">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
            </div>

            <div class="grid-container">
                <table id="crossword-grid"></table>
                
                <div class="x-axis">
                    <span></span><span></span><span></span><span></span><span></span><span></span>
                    <span></span><span></span><span></span><span></span><span></span><span></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const gridLetters = [
            ['C','A','P','I','T','A','L','G','A','I','N','S'], 
            ['M','A','R','G','I','N','S','T','W','O','R','K'], 
            ['P','R','O','F','I','T','Y','E','A','R','L','Y'], 
            ['R','E','V','E','N','U',' ','F','U','N','D','S'], 
            ['S','T','W','E','A','L','T','H','B','A','N','K'], 
            ['B','R',' ','K','E','R','A','G','E','F','E','E'], 
            ['D','I','V','I','D','E','N','D','P','A','Y','S'], 
            ['G','R','O','W','T','H','A','S','S','E','T','S'], 
            ['E','Q','U','I','T','Y','M','A','R','K','E','T']  
        ];

        const table = document.getElementById('crossword-grid');
        gridLetters.forEach(row => {
            const tr = document.createElement('tr');
            row.forEach(letter => {
                const td = document.createElement('td');
                td.textContent = letter;
                tr.appendChild(td);
            });
            table.appendChild(tr);
        });
    </script>
</body>
</html>
