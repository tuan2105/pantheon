<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Gate Crossword</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            color: #333;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header-container {
            width: 100%;
            max-width: 800px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
        }

        .home-btn {
            position: absolute;
            left: 0;
            text-decoration: none;
            color: #c0392b;
            font-weight: 600;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 18px;
            border-radius: 25px;
            background: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: all 0.2s ease-in-out;
            border: 1px solid #f0f0f0;
        }

        .home-btn:hover {
            background: #c0392b;
            color: #fff;
            box-shadow: 0 4px 12px rgba(192, 57, 43, 0.25);
            transform: translateY(-1px);
        }

        .home-icon {
            font-size: 18px;
            line-height: 1;
        }

        h1 {
            text-align: center;
            color: #c0392b;
            margin: 0;
            font-size: 2.4rem;
            letter-spacing: 1px;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.8);
        }

        .crossword-wrapper {
            background: #ffffff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
            border: 1px solid #eaeaea;
        }

        .crossword-board {
            display: grid;
            grid-template-columns: repeat(10, 48px);
            grid-template-rows: repeat(16, 48px);
            gap: 2px;
            background-color: #2c3e50;
            border: 3px solid #2c3e50;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .cell {
            width: 48px;
            height: 48px;
            background-color: #fff;
            position: relative;
        }

        .cell.empty {
            background-color: transparent;
        }

        .number {
            position: absolute;
            top: 2px;
            right: 3px;
            font-size: 11px;
            font-weight: bold;
            color: #c0392b;
            line-height: 1;
            z-index: 20;
            pointer-events: none; /* Allows clicking through to the input */
        }

        .cell-input {
            width: 100%;
            height: 100%;
            border: none;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            color: #2c3e50;
            text-transform: uppercase;
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            background-color: transparent;
            font-family: inherit;
            transition: background-color 0.2s, box-shadow 0.2s;
            cursor: text;
        }

        .cell-input:focus {
            outline: none;
            background-color: #fdf3f2;
            box-shadow: inset 0 0 0 3px #e74c3c;
            z-index: 10;
            position: relative;
        }
        
        /* Mobile responsiveness */
        @media (max-width: 600px) {
            .header-container {
                flex-direction: column;
                gap: 20px;
            }
            .home-btn {
                position: relative;
                align-self: flex-start;
            }
            .crossword-board {
                grid-template-columns: repeat(10, 32px);
                grid-template-rows: repeat(16, 32px);
            }
            .cell {
                width: 32px;
                height: 32px;
            }
            .cell-input {
                font-size: 16px;
            }
            .number {
                font-size: 9px;
            }
        }
    </style>
</head>
