<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prison 18</title>
    <style>
        body {
            /* Added the requested background image */
            background-image: url('https://thumbs.dreamstime.com/b/digital-prison-where-inmates-contained-individual-glowing-hexagonal-cells-ai-controlled-security-system-368978623.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Home Button Styling */
        .home-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #00ffff;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: bold;
            border: 1px solid #00ffff;
            border-radius: 5px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
        }

        .home-btn:hover {
            background: #00ffff;
            color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.8);
        }

        /* Glassmorphism Panel */
        .prison-wall {
            background-color: rgba(15, 15, 20, 0.85);
            backdrop-filter: blur(10px); /* Blurs the background behind the panel */
            -webkit-backdrop-filter: blur(10px);
            padding: 50px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.9), 0 0 20px rgba(0, 255, 255, 0.1);
            max-width: 600px;
            text-align: center;
            position: relative;
        }

        h1 {
            color: #ff3333;
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-top: 0;
            font-size: 2.8rem;
            text-shadow: 0 0 15px rgba(255, 51, 51, 0.6);
        }

        .subtitle {
            font-style: italic;
            color: #aaa;
            margin-bottom: 30px;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        .equations {
            font-size: 1.5rem;
            line-height: 2.2;
            text-align: left;
            display: inline-block;
            margin-bottom: 40px;
            background: rgba(0, 0, 0, 0.6);
            padding: 20px 40px;
            border-left: 4px solid #00ffff;
            border-radius: 0 8px 8px 0;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
        }

        .final-line {
            font-weight: bold;
            font-size: 1.4rem;
            color: #ff3333;
            border-top: 1px dashed rgba(255, 51, 51, 0.5);
            padding-top: 25px;
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.4);
        }

        .morse-code {
            font-family: monospace;
            font-size: 1.2rem;
            color: #00ffff;
            margin-top: 20px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.4);
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            body {
                background-attachment: scroll; /* Better performance on mobile */
                height: auto;
                min-height: 100vh;
                overflow: auto;
                padding: 20px;
            }

            .prison-wall {
                padding: 20px;
                max-width: 100%;
                margin: 0 auto;
            }

            h1 {
                font-size: 2rem;
                letter-spacing: 3px;
            }

            .subtitle {
                font-size: 1rem;
            }

            .equations {
                font-size: 1.2rem;
                padding: 15px 20px;
            }

            .final-line {
                font-size: 1.2rem;
                padding-top: 15px;
            }

            .morse-code {
                font-size: 1rem;
            }

            .home-btn {
                top: 10px;
                left: 10px;
                padding: 8px 16px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <a href="index.html" class="home-btn">◄ Home</a>

    <div class="prison-wall">
        <h1>Prison 18</h1>
        
        <div class="subtitle">
            "Guess the name of the one trapped here before you"
        </div>

        <div class="equations">
            5 🕯️ = 10<br>
            3 💀 🕯️ = 92<br>
            10 💀 ⛓️ + 4 ⛓️ = 68<br>
            50 ⛓️ 🕯️ = -58<br>
            (-⛓️ * 3🕯️ - 1) 💀 ⛓️ 🕯️ = 🗝️
        </div>

        <div class="final-line">
            (number only) 💀 * 🕯️ * ⛓️ * 🗝️ = ?
        </div>

        <div class="morse-code">
            — — • — — • — • — — • — —
        </div>
    </div>

</body>
</html>
