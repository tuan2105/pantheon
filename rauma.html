<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Re-Genesis: Hall of Echoes</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        :root {
            --bg-color: #050914;
            --text-color: #c9d1d9;
            --red-door: rgba(139, 0, 0, 0.2);
            --red-glow: #ff2a2a;
            --blue-door: rgba(0, 61, 102, 0.2);
            --blue-glow: #00e5ff;
            --green-door: rgba(0, 77, 0, 0.2);
            --green-glow: #39ff14;
            --yellow-glow: #ffd700;
            --yellow-door: rgba(255, 215, 0, 0.2);
            --unlocked-bg: rgba(88, 166, 255, 0.1);
            --unlocked-glow: #58a6ff;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text-color);
            font-family: 'Share Tech Mono', monospace;
            text-align: center;
            padding: 40px 20px 20px 20px;
            margin: 0;
            position: relative;
        }

        /* Home Button */
        .home-btn {
            position: absolute;
            top: 25px;
            left: 25px;
            color: var(--blue-glow);
            text-decoration: none;
            font-size: 16px;
            border: 1px solid var(--blue-glow);
            padding: 8px 15px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
            background: rgba(0, 229, 255, 0.05);
            text-shadow: 0 0 5px var(--blue-glow);
            box-shadow: inset 0 0 5px rgba(0, 229, 255, 0.2);
        }

        .home-btn:hover {
            background: rgba(0, 229, 255, 0.2);
            box-shadow: 0 0 15px var(--blue-glow), inset 0 0 10px var(--blue-glow);
        }

        h1 {
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px var(--blue-glow);
        }

        /* Legend */
        .legend {
            margin: 0 auto 40px auto;
            display: inline-flex;
            justify-content: center;
            gap: 25px;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 25px;
            border: 1px solid #30363d;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .color-box {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            box-shadow: 0 0 8px currentColor;
        }

        /* Grid and Doors */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            max-width: 1300px;
            margin: 0 auto;
        }

        .door {
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 25px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(5px);
        }

        .door::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 3px;
            background: currentColor;
            opacity: 0.8;
            box-shadow: 0 0 10px currentColor;
        }

        .door:hover {
            transform: translateY(-5px);
        }

        .door-red { 
            color: var(--red-glow);
            background: var(--red-door); 
            border-color: rgba(255, 42, 42, 0.3);
        }
        .door-red:hover { box-shadow: 0 10px 20px rgba(255, 42, 42, 0.2), inset 0 0 15px rgba(255, 42, 42, 0.1); }
       .door-yellow { 
            color: var(--yellow-glow);
            background: var(--yellow-door); 
            border-color: rgba(255, 215, 0, 0.3);
        }
        .door-yellow:hover { box-shadow: 0 10px 20px rgba(255, 215, 0, 0.2), inset 0 0 15px rgba(255, 215, 0, 0.1); }
        .door-blue { 
            color: var(--blue-glow);
            background: var(--blue-door); 
            border-color: rgba(0, 229, 255, 0.3);
        }
        .door-blue:hover { box-shadow: 0 10px 20px rgba(0, 229, 255, 0.2), inset 0 0 15px rgba(0, 229, 255, 0.1); }

        .door-green { 
            color: var(--green-glow);
            background: var(--green-door); 
            border-color: rgba(57, 255, 20, 0.3);
        }
        .door-green:hover { box-shadow: 0 10px 20px rgba(57, 255, 20, 0.2), inset 0 0 15px rgba(57, 255, 20, 0.1); }

        .door-number {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-shadow: 0 0 8px currentColor;
        }

        input[type="text"] {
            width: 85%;
            padding: 10px;
            margin-bottom: 15px;
            background-color: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            text-align: center;
            font-family: inherit;
            font-size: 14px;
            border-radius: 4px;
            letter-spacing: 1px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: currentColor;
            box-shadow: 0 0 8px currentColor;
        }

        button {
            padding: 8px 20px;
            background-color: transparent;
            color: currentColor;
            border: 1px solid currentColor;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            text-shadow: 0 0 5px currentColor;
        }

        button:hover { 
            background-color: currentColor; 
            color: #000;
            box-shadow: 0 0 10px currentColor;
        }
        
        button.error { 
            background-color: #ff2a2a; 
            color: #000; 
            border-color: #ff2a2a; 
            box-shadow: 0 0 15px #ff2a2a;
        }

        .unlocked {
            color: var(--unlocked-glow) !important;
            background: var(--unlocked-bg) !important;
            border-color: var(--unlocked-glow) !important;
            box-shadow: 0 0 20px rgba(88, 166, 255, 0.3) !important;
        }

        .success-text {
            font-size: 18px;
            font-weight: bold;
            margin-top: 10px;
            letter-spacing: 2px;
            animation: pulse 2s infinite;
        }

        .echo-name {
            color: #fff;
            font-size: 15px;
            margin-top: 15px;
            opacity: 0.9;
        }

        @keyframes pulse {
            0% { text-shadow: 0 0 5px currentColor; }
            50% { text-shadow: 0 0 20px currentColor; }
            100% { text-shadow: 0 0 5px currentColor; }
        }

        /* mobile tweaks */
        @media (max-width: 600px) {
            .home-btn {
                top: 10px;
                left: 10px;
                font-size: 14px;
                padding: 6px 12px;
            }
            h1 {
                font-size: 2em;
            }
            .legend {
                flex-direction: column;
                gap: 10px;
            }
            .grid-container {
                gap: 15px;
            }
            .door {
                padding: 15px 10px;
            }
        }
    </style>
